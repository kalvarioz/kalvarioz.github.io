<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Music Library</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="js/script.js" defer></script>

</head>
<body>

  <header>
    <h1>Music Library</h1>
    <h4>Search for an artist and play their music!</h4>
  </header>

 <main>

    <section id="artistView">
      <div class="search-section">
        <input type="text"id="artistSearch"placeholder="Search by artist name..."/>
        <button id="artistClearBtn">Clear</button>
      </div>

      <p id="artistStatus" class="status-msg">Showing all artists.</p>
      <div id="artistGrid" class="artist-grid"></div>
    </section>

    <section id="trackView" class="hidden">
      <div class="track-view-header">
        <button id="backBtn">Back to Artists</button>
        <div class="artist-banner">
          <img id="artistBannerImg" src="" alt="" />
          <div>
            <h2 id="artistBannerName"></h2>
            <p id="artistBannerCount" class="subtitle"></p>
          </div>
        </div>
      </div>

      <p id="trackStatus" class="status-msg"></p>
      <div id="trackGrid" class="results-grid"></div>
    </section>

  </main>

  <footer>
    <p>By Brandon Calvario. All music belongs to their rightful owners, for educational purposes only.</p>
  </footer>
</body>
</html>
